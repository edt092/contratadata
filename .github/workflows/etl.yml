name: ETL Pipeline — ContrataData

on:
  schedule:
    - cron: '0 8 * * *'   # 3 AM Colombia (UTC-5) = 8 AM UTC
  workflow_dispatch:
    inputs:
      date_from:
        description: 'Cargar desde fecha (YYYY-MM-DD). Vacío = incremental automático.'
        required: false
        default: ''
      max_records:
        description: 'Límite de registros (0 = sin límite)'
        required: false
        default: '0'
      force_full:
        description: 'Forzar recarga completa (1 = sí)'
        required: false
        default: ''

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar pipeline ETL
        run: python pipeline.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SOCRATA_APP_TOKEN: ${{ secrets.SOCRATA_APP_TOKEN }}
          LOG_LEVEL: INFO
          DATE_FROM: ${{ github.event.inputs.date_from }}
          MAX_RECORDS: ${{ github.event.inputs.max_records }}
          FORCE_FULL_LOAD: ${{ github.event.inputs.force_full }}
          PAGE_DELAY: '0.3'
